<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Election Results Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fc;
margin:0;
padding:0;
}

.header{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
padding:20px;
background:#0d47a1;
color:white;
}

.header img{
height:80px;
}

.school-title{
text-align:center;
}

.school-title h1{
margin:0;
font-size:32px;
}

.school-title p{
margin:5px 0;
font-size:16px;
}

.login-box{
width:350px;
margin:120px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.2);
text-align:center;
}

.login-box input{
width:90%;
padding:12px;
margin-top:10px;
font-size:16px;
}

.login-box button{
padding:12px 25px;
margin-top:15px;
font-size:16px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.dashboard{
display:none;
padding:20px;
}

.top-bar{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:25px;
}

.card{
background:white;
padding:15px 25px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
font-size:20px;
font-weight:bold;
}

.btn{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.print-btn{
background:#1565c0;
color:white;
}

.csv-btn{
background:#2e7d32;
color:white;
}

.ministry-card{
background:white;
margin-bottom:30px;
padding:20px;
border-radius:15px;
box-shadow:0 3px 12px rgba(0,0,0,.1);
}

.ministry-title{
font-size:24px;
font-weight:bold;
color:#0d47a1;
margin-bottom:15px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th{
background:#0d47a1;
color:white;
padding:10px;
}

table td{
padding:10px;
text-align:center;
border:1px solid #ddd;
}

.winner{
background:#c8e6c9;
font-weight:bold;
}

canvas{
max-width:100%;
margin-top:20px;
}

.footer{
text-align:center;
padding:20px;
color:#555;
}

</style>
</head>

<body>

<div id="loginPage">

<div class="login-box">

<h2>Election Results Login</h2>

<input
type="password"
id="password"
placeholder="Enter Password"
onkeypress="if(event.key==='Enter') login()">

<br>

<button onclick="login()">
Login
</button>

</div>

</div>

<div id="dashboard" class="dashboard">

<div class="header">

<img src="2.JPG">

<div class="school-title">

<h1>RASHTROTTHANA VIDYA KENDRA</h1>

<p>KALABURAGI</p>

<p>Student Council Election Results 2025–26</p>

</div>

<img src="2 (2).JPG">

</div>

<div class="top-bar">

<div class="card">
Total Votes:
<span id="totalVotes">0</span>
</div>

<button class="btn print-btn" onclick="window.print()">
Print Results
</button>

<button class="btn csv-btn" onclick="exportCSV()">
Export CSV
</button>

</div>

<div id="resultsContainer"></div>

<div class="footer">
Auto Refresh Every 10 Seconds
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyPT1kEWtcJlMgdb2LBNHFxcgzEW5dYbErgUGWHzcMrl0WjWDNg6azGcFzC68NUiX9NLQ/exec";

const ADMIN_PASSWORD = "admin123";

let latestData = {};
let charts = {};

const pass =
document.getElementById("password").value;

if(pass === ADMIN_PASSWORD){

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboard").style.display="block";

loadResults();

setInterval(loadResults,10000);

}else{

alert("Invalid Password");

}

}
  async function loadResults() {

try {

const response = await fetch(API_URL);
const data = await response.json();

latestData = data;

renderResults(data);

} catch(error) {

console.error(error);

document.getElementById("resultsContainer").innerHTML =
"<h2 style='color:red;text-align:center;'>Unable to load results</h2>";

}

}

function renderResults(data) {

const container =
document.getElementById("resultsContainer");

container.innerHTML = "";

let totalVotes = 0;

for(const ministry in data){

const candidates = data[ministry];

let winnerVotes = 0;

for(const candidate in candidates){

if(candidates[candidate] > winnerVotes){

winnerVotes = candidates[candidate];

}

totalVotes += candidates[candidate];

}

const card = document.createElement("div");
card.className = "ministry-card";

let html = `
<div class="ministry-title">
${ministry}
</div>

<table>

<tr>
<th>Candidate</th>
<th>Votes</th>
</tr>
`;

for(const candidate in candidates){

const votes = candidates[candidate];

const winnerClass =
votes === winnerVotes ? "winner" : "";

html += `
<tr class="${winnerClass}">
<td>${candidate}</td>
<td>${votes}</td>
</tr>
`;

}

html += `
</table>

<canvas id="${ministry.replace(/\s+/g,'')}"></canvas>
`;

card.innerHTML = html;

container.appendChild(card);

setTimeout(()=>{

function createChart(canvasId,data){

const ctx = document.getElementById(canvasId);

if(!ctx) return;

if(charts[canvasId]){
charts[canvasId].destroy();
}

charts[canvasId] = new Chart(ctx,{
type:'bar',

data:{
labels:Object.keys(data),

datasets:[{
label:'Votes',
data:Object.values(data)
}]
},

options:{
responsive:true,

plugins:{
legend:{
display:false
}
},

scales:{
y:{
beginAtZero:true
}
}
}
});

}

function exportCSV(){

let csv =
"Ministry,Candidate,Votes\n";

for(const ministry in latestData){

for(const candidate in latestData[ministry]){

csv +=
`"${ministry}","${candidate}",${latestData[ministry][candidate]}\n`;

}

}

const blob =
new Blob([csv],{type:"text/csv"});

const url =
window.URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download = "ElectionResults.csv";

a.click();

window.URL.revokeObjectURL(url);

}
</script>
</body>
</html>
