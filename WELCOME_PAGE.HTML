<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome - Student Elections</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
 background: linear-gradient(rgba(255,253,231, 0.9), rgba(255,253,231, 0.9)),
                  url('panchamukhi.png') no-repeat center center fixed;
background-size: cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:700px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
}

.header{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
}

.header img{
height:80px;
}

h1{
color:#1a237e;
font-size:28px;
font-family:Georgia,serif;
}

h2{
color:#d84315;
margin-bottom:30px;
}

label{
display:block;
margin-top:20px;
margin-bottom:8px;
font-weight:bold;
color:#0d47a1;
}

select{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:30px;
padding:14px 30px;
font-size:18px;
background:#388e3c;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#2e7d32;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="2.png" alt="Logo">
<div>
<h1>RASHTROTTHANA VIDYA KENDRA</h1>
<h1>KALABURAGI</h1>


<h2>Student Council Election 2026-27</h2>

<label>CLASS</label>

<select id="studentClass" onchange="populateRolls()">
<option value="">Select Class</option>
<option value="IVA">IVA</option>
<option value="IVB">IVB</option>
<option value="VA">VA</option>
<option value="VB">VB</option>
<option value="VIA">VIA</option>
<option value="VIB">VIB</option>
<option value="VII">VII</option>
<option value="VIII">VIII</option>
</select>

<label>ROLL NUMBER</label>

<select id="rollNumber">
<option value="">Select Roll Number</option>
</select>

<button onclick="enterVotingBooth()">
ENTER VOTING BOOTH
</button>

</div>

<script>

const classWiseRolls = {
IVA:30,
IVB:30,
VA:35,
VB:35,
VIA:30,
VIB:30,
VII:46,
VIII:38
};

function populateRolls(){

const selectedClass =
document.getElementById("studentClass").value;

const rollDropdown =
document.getElementById("rollNumber");

rollDropdown.innerHTML =
'<option value="">Select Roll Number</option>';

if(classWiseRolls[selectedClass]){

for(let i=1;i<=classWiseRolls[selectedClass];i++){

const option =
document.createElement("option");

option.value=i;
option.textContent=i;

rollDropdown.appendChild(option);
}
}
}

function enterVotingBooth(){

const studentClass =
document.getElementById("studentClass").value;

const rollNumber =
document.getElementById("rollNumber").value;

if(!studentClass || !rollNumber){

alert(
"Please select Class and Roll Number."
);

return;
}

sessionStorage.setItem(
"studentClass",
studentClass
);

sessionStorage.setItem(
"rollNumber",
rollNumber
);

window.location.href="vote1.html";
}

</script>

</body>
</html>
