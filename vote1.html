<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Voting Booth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap');
    body {
      font-family: 'Ubuntu', sans-serif;
      background: #f9fbe7;
      margin: 0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .header img {
      height: 80px;
    }
    .school-title {
      text-align: center;
    }
    .school-title h1 {
      color: #1a237e;
      font-size: 28px;
      font-weight: bold;
      font-family: Georgia, Cambria, serif;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
      margin: 0;
    }
    .school-title p {
      font-size: 14px;
      margin: 4px 0 0;
      color: #004953;
    }
    h2 {
      text-align: center;
      color: #4B0082;
      font-size: 28px;
      margin-bottom: 30px;
    }
    .ministry {
      border: 4px solid #a5d6a7;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 40px;
      background-color: #ffffff;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      animation: bounceIn 0.8s ease;
    }
    .ministry:hover {
      transform: scale(1.01);
      transition: transform 0.4s ease;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }
    .ministry h3 {
      text-align: center;
      text-transform: uppercase;
      color: white;
      background-color: #3D0C02;
      padding: 12px;
      border-radius: 16px;
      font-size: 25px;
      letter-spacing: 1px;
      margin-top: 0;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    }
    .candidates {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }
    .candidate {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 130px;
      padding: 12px;
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
    }
    .candidate:hover {
      background-color: #FFD700;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      transform: translateY(-4px);
      cursor: pointer;
      color:#0000FF;
    }
    .candidate .photo {
      width: 100px;
      height: 100px;
      background-color: #c8e6c9;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 36px;
      font-weight: bold;
      color: #FF0080;
      margin-bottom: 10px;
      transition: transform 0.3s ease;
    }
    .candidate:hover .photo {
      transform: scale(1.1);
      color:#0000FF;
    }
    .candidate-name {
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 5px;
      color:#FF004F;
    }
    .candidate input[type="radio"] {
      transform: scale(1.2);
      margin-top: 5px;
    }
    .submit-btn {
      display: block;
      margin: 40px auto;
      padding: 14px 36px;
      font-size: 18px;
      background-color: #388e3c;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      position: sticky;
      bottom: 20px;
    }
    .submit-btn:hover {
      background-color: #2e7d32;
    }
    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      60% {
        opacity: 1;
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="2 (2).JPG" alt="Left Logo">
    <div class="school-title">
      <h1>RASHTROTTHANA VIDYA KENDRA, KALABURAGI</h1>
      <p><b><font size="4" color="blue">Empowering Leaders of Tomorrow</font></b></p>
    </div>
    <img src="2.JPG" alt="Right Logo">
  </div>

  <h2>Student Council Voting – 2025–26</h2>
  <form id="votingForm" onsubmit="return validateVote();">
    <script>
      const ministries = {
        "vidyarthi_boys": ["AMARNATH", "AMBRISH"],
        "vidyarthi_girls": ["SINCHANA", "ANAGHA", "ANVI"],
        "anushasan": ["KARTHIK", "MANISH", "AKSHATA", "SPOORTI", "SANIKA", "PRAJWAL C", "SAMARTH", "ADVAITH J", "PRACHEEN", "SAMRUDDHI", "SANVI"],
        "pariyavaran": ["NITYASHREE A T", "PRABHAS", "PRITHVIRAJ", "ARNAV", "SUPRITA", "AROHI", "KHAGENDRA", "AKSHATA"],
        "aarogya": ["CHIRANTAN", "NAYANA", "SHASHANK", "SHRADDHA", "SHREYAS", "SAMRUDDHI K", "SURAJ", "CHETAN", "BHAGYAWANTH"],
        "kreeda": ["AYUSH", "KRUPA", "HARSH", "SHREENIDHI", "SANVI", "SAAKSHI", "RISHIKA", "PRATHAM", "KUSHAL"],
        "sanskrutik": ["SUDHIKSHA", "PRIYA", "PAVAN", "ANANYA", "SUNIDHI", "SUDHANVA", "KUMUD", "AMEJU", "SAHANA", "SANGMESH", "VITABHYA"],
        "vahini": ["ATHARVA (ORANGE)", "RAJNEET (BLUE)", "SIDDARTH (BLUE)", "TARUN (YELLOW)", "SUPRIT (YELLOW)", "SHARAN (YELLOW)", "NITYASHREE M H (YELLOW)", "PREETAM (RED)", "PRAKRUTI (ORANGE)", "AMRUTA (ORANGE)", "HARSHITA (YELLOW)", "SANCHI (RED)", "AKSHARA (BLUE)"]
      };

      const ministryNames = {
      "vidyarthi_boys": "Vidyarthi Pradhan (Boys)",
        "vidyarthi_girls": "Vidyarthi Pradhan (Girls)",
        "anushasan": "Anushasan Pradhan",
        "pariyavaran": "Pariyavaran Pradhan",
        "aarogya": "Aarogya Pradhan",
        "kreeda": "Kreeda Pradhan",
        "sanskrutik": "Sanskrutik Pradhan",
        "vahini": "Vahini Pramukh"
      };

      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("votingForm");
        const fragment = document.createDocumentFragment();

        for (const key of Object.keys(ministryNames)) {
          const candidates = ministries[key];
          const div = document.createElement("div");
          div.className = "ministry";
          div.id = key;
          div.innerHTML = `<h3>${ministryNames[key]}</h3>`;

          const container = document.createElement("div");
          container.className = "candidates";

          candidates.forEach(name => {
            const label = document.createElement("label");
            label.className = "candidate";
            label.innerHTML = `
              <div class="photo">${name.charAt(0)}</div>
              <div class="candidate-name">${name}</div>
              <input type="radio" name="${key}" value="${name}">
            `;
            container.appendChild(label);
          });

          div.appendChild(container);
          fragment.appendChild(div);
        }

        form.insertBefore(fragment, form.querySelector(".submit-btn"));

      });
	  		const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbwCz_n0UJm2LH3SOXXFyXSmggVtSbTZumS-MFSR4UEILE-5TMqPJUuqB7vidqymB4As5w/exec";

function validateVote() {

  for (const key in ministries) {
    if (!document.querySelector(`input[name="${key}"]:checked`)) {
      alert(`Please select one candidate for ${ministryNames[key]}`);
      document.getElementById(key).scrollIntoView({
        behavior: "smooth"
      });
      return false;
    }
  }

  const studentClass = sessionStorage.getItem("studentClass");
  const rollNumber = sessionStorage.getItem("rollNumber");

  const voterId = `${studentClass}_${rollNumber}`;

  const votePromises = [];

  for (const key in ministries) {

    const ministryName = ministryNames[key];
    const selected = document.querySelector(
      `input[name="${key}"]:checked`
    );

    if (selected) {

      votePromises.push(
        fetch(WEBAPP_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify({
            voterId: voterId,
            ministry: ministryName,
            candidate: selected.value
          })
        })
      );

    }
  }

  Promise.all(votePromises)
    .then(() => {

      document.querySelector(".submit-btn").disabled = true;

      const message = document.createElement("div");
      message.textContent =
        "✅ Your vote has been recorded. Thank you!";

      message.style.textAlign = "center";
      message.style.color = "#2e7d32";
      message.style.fontSize = "24px";
      message.style.marginTop = "30px";

      document
        .getElementById("votingForm")
        .appendChild(message);

      setTimeout(() => {
        window.location.href = "WELCOME_PAGE.HTML";
      }, 3000);

    })
    .catch(error => {

      console.error("FETCH ERROR:", error);

      alert(
        "Unable to submit vote.\n\n" +
        error
      );

    });

  return false;
}

        document.querySelector(".submit-btn").disabled = true;
        const message = document.createElement("div");
        message.textContent = "✅ Your vote has been recorded. Thank you!";
        message.style.textAlign = "center";
        message.style.color = "#2e7d32";
        message.style.fontSize = "24px";
        message.style.marginTop = "30px";
        document.getElementById("votingForm").appendChild(message);

        setTimeout(() => {
          window.location.href = "WELCOME_PAGE.html";
        }, 3000);

        return false;
      }
    </script>

    <button type="submit" class="submit-btn">SUBMIT VOTE</button>
  </form>
</body>
</html>
